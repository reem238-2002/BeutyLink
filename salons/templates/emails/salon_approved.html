<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<style>
body { font-family: 'Tajawal', sans-serif; background: #f9f9f9; padding: 20px; }
.container { background: #fff; padding: 30px; border-radius: 10px; max-width: 600px; margin: auto; }
h2 { color: #ff4d6d; }
p { font-size: 16px; color: #333; }
.button {
    display: inline-block;
    padding: 12px 20px;
    background: #ff4d6d;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    margin-top: 20px;
}
</style>
</head>
<body>
<div class="container">
    <h2>مرحباً {{ name }} 💖</h2>
    <p>تم قبول طلبك لتصبح كوافر على منصة {{ site_name }}.</p>
    <p>يمكنك الآن تسجيل الدخول إلى لوحة التحكم الخاصة بك باستخدام بياناتك التالية:</p>
    <ul>
        <li><strong>اسم المستخدم:</strong> {{ username }}</li>
        <li><strong>كلمة المرور:</strong> {{ password }}</li>
    </ul>
    <a href="{{ site_url }}" class="button">تسجيل الدخول الآن</a>
    <p>تحياتنا،<br>فريق {{ site_name }}</p>
</div>
</body>
</html>
