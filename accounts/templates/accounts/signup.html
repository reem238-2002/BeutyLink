{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | بيوتي لينك</title>

    <!-- CSS -->
    <link href="{% static 'css/login.css' %}" rel="stylesheet">

    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <h2>إنشاء حساب</h2>

        {% if messages %}
            {% for message in messages %}
                <div class="error-box">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>اسم المستخدم</label>
                <input type="text" name="username" placeholder="أدخلي اسم المستخدم" required>
            </div>

            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" name="email" placeholder="أدخلي البريد الإلكتروني" required>
            </div>

            <div class="form-group password-group">
                <label>كلمة المرور</label>
                <div class="password-wrapper">
                    <input type="password" id="password1" name="password1" placeholder="أدخلي كلمة المرور" required>
                    <i class="fa-solid fa-eye toggle-password"></i>
                </div>
            </div>

            <div class="form-group password-group">
                <label>تأكيد كلمة المرور</label>
                <div class="password-wrapper">
                    <input type="password" id="password2" name="password2" placeholder="أعيدي كلمة المرور" required>
                    <i class="fa-solid fa-eye toggle-password"></i>
                </div>
            </div>

            <button type="submit" class="btn-login">إنشاء حساب</button>
        </form>

        <p class="signup-link">
            لديك حساب بالفعل؟ <a href="{% url 'login' %}">تسجيل الدخول</a>
        </p>
    </div>
</div>

<!-- ربط JS خارجي -->
<script src="{% static 'js/password-toggle.js' %}"></script>

</body>
</html>
