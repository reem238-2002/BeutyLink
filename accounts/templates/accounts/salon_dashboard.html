{% load static %}
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الكوافير | بيوتي لينك</title>
    <link rel="stylesheet" href="{% static 'css/salon_dashboard.css' %}">
</head>
<body>
    <div class="salon-dashboard">
        <aside class="sidebar">
            <h2>لوحة الكوافير</h2>
            <ul>
                <li><a href="#">إضافة خدمة</a></li>
                <li><a href="#">تعديل الخدمات</a></li>
                <li><a href="#">حذف الخدمات</a></li>
                <li><a href="{% url 'logout' %}">تسجيل الخروج</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <h1>مرحباً {{ request.user.username }}</h1>
            <div class="cards-container">
                <div class="card">
                    <h3>الخدمات</h3>
                    <p>عدد الخدمات: 10</p>
                </div>
                <div class="card">
                    <h3>الحجوزات</h3>
                    <p>عدد الحجوزات اليوم: 25</p>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
